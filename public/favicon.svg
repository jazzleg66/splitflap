<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark tile background -->
  <rect width="32" height="32" fill="#1B1B1B"/>

  <!-- Top half -->
  <rect width="32" height="16" fill="#1B1B1B"/>

  <!-- Center seam (2px black line) -->
  <line x1="0" y1="16" x2="32" y2="16" stroke="#000" stroke-width="2"/>

  <!-- Faint highlight below seam (glass/material depth) -->
  <line x1="0" y1="17" x2="32" y2="17" stroke="#444" stroke-width="0.5" opacity="0.5"/>

  <!-- White "S" character (split-flap indicator) -->
  <text x="16" y="22" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-size="18" font-weight="bold" fill="#FAFAFA">S</text>
</svg>
