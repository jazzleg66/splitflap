<!DOCTYPE html>
<html>
<head>
    <title>Debug QR Code</title>
    <style>
        body { background: #1B1B1B; color: #E8D5A3; font-family: monospace; padding: 20px; }
        pre { background: #0a0a0a; padding: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>QR Code Debug Console</h1>
    <pre id="log"></pre>
    
    <script>
        const log = msg => {
            const el = document.getElementById('log');
            el.textContent += msg + '\n';
            console.log(msg);
        };
        
        log('🔍 Starting WebSocket test...');
        log(`📍 Location: ${location.href}`);
        log(`🌐 Host: ${location.host}`);
        log(`🔌 Protocol: ${location.protocol}`);
        
        const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${wsProtocol}://${location.host}/ws`;
        log(`\n📡 Connecting to: ${wsUrl}\n`);
        
        const ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            log('✅ WebSocket OPEN');
            log('📤 Sending tv_hello...');
            ws.send(JSON.stringify({ type: 'tv_hello' }));
        };
        
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            log(`📬 Received: ${msg.type}`);
            if (msg.type === 'tv_paired') {
                log(`✅ SUCCESS: Got tv_paired!`);
                log(`   SessionId: ${msg.sessionId}`);
                log(`   PairCode: ${msg.pairCode}`);
                log(`\n🎉 QR Code System Working!`);
            }
        };
        
        ws.onerror = (err) => {
            log(`❌ WebSocket ERROR: ${err}`);
        };
        
        ws.onclose = () => {
            log('⚠️ WebSocket closed');
        };
        
        setTimeout(() => {
            log('\n⏱️ (5 second timeout - no response)');
        }, 5000);
    </script>
</body>
</html>
