<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/board/">
  <title>Split Flap — Board</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">

  <link rel="preload" href="/assets/audio/split-flap.wav?v=20260403" as="fetch" crossorigin="anonymous">
  <link rel="stylesheet" href="/shared/splitflap.css?v=20260720-fontfix">
  <link rel="stylesheet" href="/board/board.css?v=20260711-landscape3">
</head>

<body>

  <!-- ── QR pairing screen — shown until a phone connects ── -->
  <div id="qr-screen">
    <div id="qr-inner">
      <p id="qr-label">SCAN TO CONNECT</p>
      <div id="qr-container">
        <div id="qr-loading" class="qr-spinner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <img id="qr-img" alt="QR Code">
      </div>
      <button id="btn-show-code">ENTER CODE MANUALLY</button>
      <div id="pair-code" hidden>------</div>
    </div>
  </div>

  <!-- ── Connection status dot — always top-left ── -->
  <div id="conn-dot" class="disconnected" aria-label="Disconnected"></div>

  <!-- ── Board (hidden until phone pairs) ── -->
  <header id="board-header">
    <div id="boards-live">🟢 <span id="live-count">0</span> BOARDS LIVE</div>
  </header>

  <main id="board-container" aria-hidden="true">
    <!-- 6×22 tile grid injected by board.js (visual only; see #board-sr for a11y) -->
  </main>

  <!-- Screen-reader mirror of the board's current text content. The flip tiles
       are visual-only (aria-hidden); this live region announces updates. -->
  <div id="board-sr" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <div id="demo-controls">
    <button id="btn-skip">SKIP</button>
    <button id="btn-mute">MUTE</button>
    <button id="btn-fullscreen">&#x26F6;</button>
  </div>

  <!-- Approval overlay -->
  <div id="approval-overlay" hidden>
    <div id="approval-inner">
      <p id="approval-title">CONNECTION REQUEST</p>
      <div id="approval-btns">
        <button id="btn-approve">APPROVE <kbd>↵</kbd></button>
        <button id="btn-reject">REJECT <kbd>ESC</kbd></button>
      </div>
    </div>
  </div>

  <script type="module" src="/board/board.js?v=20260711-landscape3"></script>

  <!-- Optional telemetry keys are injected by the server; scripts load only when configured. -->
  <script>
    var sentryDsn = 'YOUR_SENTRY_DSN_HERE';
    var phKey = 'YOUR_POSTHOG_KEY_HERE';
  </script>
  <script src="/shared/telemetry.js" defer></script>
</body>

</html>
