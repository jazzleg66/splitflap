<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/board/">
  <title>Digital Solari — Board</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

  <link rel="preload" href="/assets/audio/split-flap.wav" as="fetch" crossorigin="anonymous">
  <link rel="stylesheet" href="/shared/splitflap.css">
  <link rel="stylesheet" href="board.css">
</head>
<body>

  <!-- ── QR pairing screen — shown until a phone connects ─────────────────── -->
  <div id="qr-screen">
    <div id="qr-inner">
      <p id="qr-label">SCAN TO CONNECT</p>
      <div id="qr-container">
        <div id="qr-loading" class="qr-spinner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <img id="qr-img" alt="QR Code">
      </div>
      <button id="btn-show-code">ENTER CODE MANUALLY</button>
      <div id="pair-code" hidden>------</div>
    </div>
  </div>

  <!-- ── Connection status dot — always top-left ──────────────────────────── -->
  <div id="conn-dot" class="disconnected" aria-label="Disconnected"></div>

  <!-- ── Board (hidden until phone pairs) ──────────────────────────────────── -->
  <header id="board-header">
    <div id="boards-live">🟢 <span id="live-count">0</span> BOARDS LIVE</div>
  </header>

  <main id="board-container">
    <!-- 6×22 tile grid injected by board.js -->
  </main>

  <div id="demo-controls">
    <button id="btn-skip">SKIP</button>
    <button id="btn-mute">MUTE</button>
    <button id="btn-fullscreen">&#x26F6;</button>
  </div>

  <!-- Approval overlay -->
  <div id="approval-overlay" hidden>
    <div id="approval-inner">
      <p id="approval-title">CONNECTION REQUEST</p>
      <div id="approval-btns">
        <button id="btn-approve">APPROVE <kbd>↵</kbd></button>
        <button id="btn-reject">REJECT <kbd>ESC</kbd></button>
      </div>
    </div>
  </div>

  <script type="module" src="board.js"></script>

  <!-- Sentry error monitoring (optional — injected by server) -->
  <script>
    var sentryDsn = 'YOUR_SENTRY_DSN_HERE';
  </script>
  <script
    src="https://browser.sentry-cdn.com/7.119.0/bundle.min.js"
    crossorigin="anonymous"
    async></script>
  <script>
    window.addEventListener('load', function () {
      if (window.Sentry && sentryDsn && !sentryDsn.includes('YOUR_') && window.location.hostname !== 'localhost') {
        Sentry.init({ dsn: sentryDsn, environment: 'production' });
      }
    });
  </script>

  <!-- PostHog analytics (optional) -->
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");for(var n=0;n<o.length;n++)t=t[o[n]];return t}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src="https://cdn.posthog.com/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(var c in s)u["__SV_"+c]=s[c];u.__SV_loaded=!0,e.config=s,e.opt_in_capturing=function(t){e.__opt_in_capturing=t},e.opt_out_capturing=function(t){e.__opt_out_capturing=t},e.opt_out_capturing(e.__opt_out_capturing===!0),e.identify=function(t){e.people.set(e.people.identify_flag||"distinct_id",t)},e.reset=function(){delete window.posthog.distinctID},e.register=function(t){e.config=Object.assign({},e.config,t)},e.register({config_name:e.config.name,loaded:new Date().toISOString(),version:e.config.version})},e.capture=function(t,o,n){e._i.push([t,o,n])},e.pageview=function(t,o){e._i.push(["$pageview",{$current_url:t}])},e.page_view=function(t,o){e._i.push(["$pageview",{$current_url:t},o])},e.people.set=function(t){e._i.push(["people.set",t])},e.people.set_once=function(t){e._i.push(["people.set_once",t])},e.people.unset=function(t){e._i.push(["people.unset",t])},e.people.increment=function(t){e._i.push(["people.increment",t])},e.people.append=function(t){e._i.push(["people.append",t])},e.people.union=function(t){e._i.push(["people.union",t])},e.group.identify=function(t){e._i.push(["group.identify",t])},e.group.set=function(t){e._i.push(["group.set",t])},e.group.set_once=function(t){e._i.push(["group.set_once",t])},e.group.unset=function(t){e._i.push(["group.unset",t])},e.group.increment=function(t){e._i.push(["group.increment",t])},e.group.append=function(t){e._i.push(["group.append",t])},e.group.union=function(t){e._i.push(["group.union",t])},e.getFeatureFlags=function(t,o){e._i.push(["getFeatureFlags",t])},e.getVariant=function(t,o){e._i.push(["getVariant",t,o])},e.isFeatureEnabled=function(t){e._i.push(["isFeatureEnable     // Initialize PostHog if key is available
    var phKey = 'YOUR_POSTHOG_KEY_HERE'; // Replace with your PostHog key
    if (phKey && !phKey.includes('YOUR_')) {
      posthog.init(phKey, {
        api_host: 'https://app.posthog.com',
        person_profiles: 'identified_only',
        capture_pageleave: true
      });
    }
  </script>
</body>
</html>
