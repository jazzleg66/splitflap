<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Solari — Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/splitflap.css">
  <link rel="stylesheet" href="board.css">
</head>
<body>

  <header id="board-header">
    <div id="boards-live">🟢 <span id="live-count">0</span> BOARDS LIVE</div>
  </header>

  <main id="board-container">
    <!-- 6×22 tile grid injected by board.js -->
  </main>

  <!-- Demo controls — visible only during demo, placed below the board -->
  <div id="demo-controls">
    <button id="btn-skip">SKIP</button>
    <button id="btn-mute">MUTE</button>
    <button id="btn-fullscreen">&#x26F6;</button>
    <button id="btn-qr" hidden>QR CODE</button>
    <button id="btn-code" hidden>ENTER CODE</button>
  </div>

  <!-- QR popup: small centered modal, hidden until btn-qr clicked -->
  <div id="popup-qr" class="popup-overlay" hidden>
    <div class="popup-inner">
      <p class="popup-label">SCAN TO CONNECT</p>
      <img id="qr-img" alt="QR Code">
    </div>
  </div>

  <!-- Code popup: small centered modal, hidden until btn-code clicked -->
  <div id="popup-code" class="popup-overlay" hidden>
    <div class="popup-inner">
      <p class="popup-label">OR ENTER CODE MANUALLY</p>
      <div id="pair-code">------</div>
    </div>
  </div>

  <!-- Approval overlay -->
  <div id="approval-overlay" hidden>
    <div id="approval-inner">
      <p id="approval-title">CONNECTION REQUEST</p>
      <div id="approval-btns">
        <button id="btn-approve">APPROVE <kbd>↵</kbd></button>
        <button id="btn-reject">REJECT <kbd>ESC</kbd></button>
      </div>
    </div>
  </div>


  <script type="module" src="board.js"></script>
</body>
</html>
