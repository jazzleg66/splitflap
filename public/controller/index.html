<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <base href="/controller/">
  <title>Split Flap Controller</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Preload critical assets for faster paint and connection -->
  <link rel="preload" href="/shared/splitflap.css" as="style">
  <link rel="preload" href="/controller/controller.css" as="style">
  <link rel="modulepreload" href="/controller/controller.js">
  <link rel="modulepreload" href="/shared/wsClient.js">
  <link rel="modulepreload" href="/shared/spool.js">

  <!-- Preconnect to fonts and start handshake early -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preconnect to WebSocket server (same origin, so just prime the connection) -->
  <script>
    // Detect WebSocket protocol early
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    // Hint browser to preconnect (won't actually preconnect for WS, but helps with DNS)
    const link = document.createElement('link');
    link.rel = 'dns-prefetch';
    link.href = wsProto + '://' + location.host + '/ws';
    document.head.appendChild(link);
  </script>

  <!-- Async Google Fonts -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Roboto+Mono:wght@400&display=swap"
    media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Roboto+Mono:wght@400&display=swap"
      rel="stylesheet">
  </noscript>

  <link rel="stylesheet" href="/shared/splitflap.css">
  <link rel="stylesheet" href="/controller/controller.css">

  <!-- HEAD-START WEBSOCKET: Start connection while CSS/JS are still downloading -->
  <script type="module">
    import WsClient from '/shared/wsClient.js?v=2';
    console.log('[head-start] Initiating WebSocket sequence...');
    const pairCode = new URLSearchParams(location.search).get('code')?.replace(/-/g, '').toUpperCase();
    const startTime = performance.now();
    window.__initialPairCode = pairCode || '';
    if (pairCode) {
      const cleanUrl = new URL(location.href);
      cleanUrl.searchParams.delete('code');
      history.replaceState(null, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
    }
    console.log('[head-start] Page load started');

    if (!pairCode) {
      setTimeout(() => {
        const statusEl = document.getElementById('connect-status');
        if (statusEl) statusEl.innerHTML = '';
      }, 500);
    } else {
      // Initiate head-start connection. 
      // If code approval message arrives before main controller.js loads, 
      // WsClient reconnects and tries again.
      let _approvalWatchdog = null;

      window._wsHeadStart = new WsClient(() => {
        const elapsed = performance.now() - startTime;
        console.log('[head-start] Socket open after', elapsed.toFixed(0), 'ms');

        // 鈹€鈹€ Safari Stability: Wait 300ms before sending the first hello 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
        // This allows Safari's socket buffer and message loop to stabilize
        // before we start the bi-directional pairing handshake.
        setTimeout(() => {
          console.log('[head-start] Sending hello');
          window._wsHeadStart.send({ type: 'phone_hello', pairCode });
          const statusEl = document.getElementById('connect-status');
          if (statusEl) statusEl.textContent = 'WAITING FOR APPROVAL...';
        }, 300);

        // Start heartbeat delay stability check if needed, but no watchdog
        console.log('[head-start] Socket open, handshake starting...');
      });
      window._clearApprovalWatchdog = () => { };

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const wsUrl = `${proto}://${location.host}/ws`;
      console.log('[head-start] Connecting to:', wsUrl);
      window._wsHeadStart.connect(wsUrl);
      // NOTE: We intentionally do NOT attach onMessage here.
      // Any messages (e.g. phone_approved) that arrive before controller.js loads
      // will be buffered by WsClient and replayed to the real handler automatically.
    }
  </script>
</head>

<body>

  <!-- Persistent header 鈥?always visible, shows connection state -->
  <header id="ctrl-header">
    <div id="header-code">------</div>
    <div id="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-box" id="status-box">DISCONNECTED</span>
    </div>
  </header>


  <!-- Connection screen (covers body until approved) -->
  <div id="connect-screen">
    <div id="connect-status"></div>
  </div>

  <script>
    // Show elapsed time while connecting 鈥?helps diagnose connection issues
    let elapsedSeconds = 0;
    const timerEl = document.getElementById('timer-seconds');
    setInterval(() => {
      elapsedSeconds++;
      if (timerEl) timerEl.textContent = elapsedSeconds;
    }, 1000);
  </script>

  <!-- Main UI (hidden until phone_approved) -->
  <div id="controller-ui" hidden>

    <!-- PART A: Live mirror 鈥?sticky, full-width board preview -->
    <div id="mirror-section">
      <div id="preview-label">
        <span id="preview-live-text">LIVE ON BOARD</span>
        <span id="preview-code-badge">------</span>
        <span class="preview-dot"></span>
      </div>
      <div id="preview-wrapper">
        <div id="board-preview"></div>
      </div>
    </div>

    <!-- PART B: Controls 鈥?scrollable -->
    <div id="scroll-body">

      <!-- Mode selector -->
      <section id="mode-section">
        <label class="mode-label">
          <input type="radio" name="mode" value="message" checked>
          <span>MESSAGE</span>
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="clock">
          <span>CLOCK</span>
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="artwork">
          <span>ARTWORK</span>
        </label>
      </section>

      <!-- Message tabs + add button -->
      <div id="msg-nav">
        <div id="msg-tabs"></div>
        <button id="btn-add-message" title="Add message">+</button>
      </div>

      <!-- Color picker -->
      <div id="type-row">
        <span id="type-label">Color tile</span>
        <div id="emoji-picker">
          <button class="color-swatch" data-color="w" style="background:#FAFAFA" title="White"></button>
          <button class="color-swatch" data-color="r" style="background:#B34444" title="Red"></button>
          <button class="color-swatch" data-color="o" style="background:#CC8F52" title="Orange"></button>
          <button class="color-swatch" data-color="y" style="background:#F2D046" title="Yellow"></button>
          <button class="color-swatch" data-color="g" style="background:#3A5944" title="Green"></button>
          <button class="color-swatch" data-color="b" style="background:#4365A8" title="Blue"></button>
          <button class="color-swatch" data-color="p" style="background:#744471" title="Purple"></button>
        </div>
      </div>

      <!-- Active message row inputs 鈥?injected by JS -->
      <div id="message-list"></div>

      <!-- Artwork picker 鈥?shown in ARTWORK mode, injected by JS -->
      <div id="artwork-section" hidden></div>

      <!-- Hidden off-screen input 鈥?keyboard capture shim for the cell grid.
           Focused when user taps the grid; triggers virtual keyboard on iOS/Android. -->
      <input id="grid-capture" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters"
        spellcheck="false" inputmode="text"
        style="position:fixed;left:-999px;top:-999px;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0">

      <div id="loop-timer-row">
        <label>LOOP EVERY <span id="timer-value">7</span>S</label>
        <input type="range" id="timer-slider" min="5" max="60" value="7">
      </div>

    </div>
  </div>

  <!-- Persistent footer -->
  <footer id="global-controls">
    <button id="btn-play">PLAY</button>
    <button id="btn-next">NEXT</button>
    <button id="btn-reset">RESET</button>
  </footer>

  <script type="module" src="/controller/controller.js"></script>

  <!-- Optional telemetry keys are injected by the server; scripts load only when configured. -->
  <script>
    var sentryDsn = 'YOUR_SENTRY_DSN_HERE';
    var phKey = 'YOUR_POSTHOG_KEY_HERE';
  </script>
  <script src="/shared/telemetry.js" defer></script>
</body>

</html>
