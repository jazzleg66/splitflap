<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <base href="/controller/">
  <title>Solari Controller</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Preload critical assets for faster paint and connection -->
  <link rel="preload" href="/shared/splitflap.css" as="style">
  <link rel="preload" href="/controller/controller.css" as="style">
  <link rel="modulepreload" href="/controller/controller.js">
  <link rel="modulepreload" href="/shared/wsClient.js">
  <link rel="modulepreload" href="/shared/spool.js">

  <!-- Preconnect to fonts and start handshake early -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preconnect to WebSocket server (same origin, so just prime the connection) -->
  <script>
    // Detect WebSocket protocol early
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    // Hint browser to preconnect (won't actually preconnect for WS, but helps with DNS)
    const link = document.createElement('link');
    link.rel = 'dns-prefetch';
    link.href = wsProto + '://' + location.host + '/ws';
    document.head.appendChild(link);
  </script>

  <!-- Async Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Roboto+Mono:wght@400&display=swap" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  </noscript>

  <link rel="stylesheet" href="/shared/splitflap.css">
  <link rel="stylesheet" href="/controller/controller.css">

  <!-- HEAD-START WEBSOCKET: Start connection while CSS/JS are still downloading -->
  <script type="module">
    import WsClient from '/shared/wsClient.js';
    const startTime = performance.now();
    const pairCode = new URLSearchParams(location.search).get('code')?.replace(/-/g, '').toUpperCase();
    console.log('[head-start] Page load started, pairCode:', pairCode);

    if (pairCode) {
      window._wsHeadStart = new WsClient(() => {
        const elapsed = performance.now() - startTime;
        console.log('[head-start] Socket open after', elapsed.toFixed(0), 'ms, sending hello...');
        window._wsHeadStart.send({ type: 'phone_hello', pairCode });
        const statusEl = document.getElementById('connect-status');
        if (statusEl) statusEl.textContent = 'WAITING FOR APPROVAL...';
      });
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const wsUrl = `${proto}://${location.host}/ws`;
      console.log('[head-start] Connecting to:', wsUrl);
      window._wsHeadStart.connect(wsUrl);

      // Attach message handler immediately to log incoming messages
      window._wsHeadStart.onMessage(msg => {
        const elapsed = performance.now() - startTime;
        console.log('[head-start] Message received after', elapsed.toFixed(0), 'ms:', msg.type);
      });
    }
  </script>
</head>
<body>

  <!-- Persistent header — always visible, shows connection state -->
  <header id="ctrl-header">
    <div id="header-code">------</div>
    <div id="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-box" id="status-box">DISCONNECTED</span>
    </div>
  </header>

  <!-- Debug panel - always visible at the bottom -->
  <div id="debug-panel" style="position: fixed; bottom: calc(56px + env(safe-area-inset-bottom, 0px)); left: 0; right: 0; width: 100%; max-width: 480px; margin: 0 auto; background: #000; border-top: 1px solid #666; color: #0f0; font-size: 10px; font-family: monospace; padding: 5px; max-height: 80px; overflow-y: auto; z-index: 50; left: 50%; transform: translateX(-50%);">
    <div style="margin-bottom: 3px;">
      <strong style="color: #0ff;">📡 Messages:</strong>
    </div>
    <div id="debug-messages"></div>
  </div>

  <!-- Connection screen (covers body until approved) -->
  <div id="connect-screen">
    <div id="connect-status">CONNECTING...</div>
    <div id="connect-timer" style="font-size: 10px; margin-top: 10px; opacity: 0.7;">(<span id="timer-seconds">0</span>s)</div>
  </div>

  <script>
    // Show elapsed time while connecting — helps diagnose connection issues
    let elapsedSeconds = 0;
    const timerEl = document.getElementById('timer-seconds');
    setInterval(() => {
      elapsedSeconds++;
      if (timerEl) timerEl.textContent = elapsedSeconds;
    }, 1000);
  </script>

  <!-- Main UI (hidden until phone_approved) -->
  <div id="controller-ui" hidden>

    <!-- PART A: Live mirror — sticky, full-width board preview -->
    <div id="mirror-section">
      <div id="preview-label">
        <span id="preview-live-text">LIVE ON BOARD</span>
        <span id="preview-code-badge">------</span>
        <span class="preview-dot"></span>
      </div>
      <div id="preview-wrapper">
        <div id="board-preview"></div>
      </div>
    </div>

    <!-- PART B: Controls — scrollable -->
    <div id="scroll-body">

      <!-- Mode selector -->
      <section id="mode-section">
        <label class="mode-label">
          <input type="radio" name="mode" value="message" checked>
          <span>MESSAGE</span>
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="clock">
          <span>CLOCK</span>
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="artwork">
          <span>ARTWORK</span>
        </label>
      </section>

      <!-- Message tabs + add button -->
      <div id="msg-nav">
        <div id="msg-tabs"></div>
        <button id="btn-add-message" title="Add message">+</button>
      </div>

      <!-- Color picker -->
      <div id="type-row">
        <span id="type-label">Color tile</span>
        <div id="emoji-picker">
          <button class="color-swatch" data-color="w" style="background:#FAFAFA" title="White"></button>
          <button class="color-swatch" data-color="r" style="background:#B34444" title="Red"></button>
          <button class="color-swatch" data-color="o" style="background:#CC8F52" title="Orange"></button>
          <button class="color-swatch" data-color="y" style="background:#F2D046" title="Yellow"></button>
          <button class="color-swatch" data-color="g" style="background:#3A5944" title="Green"></button>
          <button class="color-swatch" data-color="b" style="background:#4365A8" title="Blue"></button>
          <button class="color-swatch" data-color="p" style="background:#744471" title="Purple"></button>
        </div>
      </div>

      <!-- Active message row inputs — injected by JS -->
      <div id="message-list"></div>

      <!-- Artwork picker — shown in ARTWORK mode, injected by JS -->
      <div id="artwork-section" hidden></div>

      <!-- Hidden off-screen input — keyboard capture shim for the cell grid.
           Focused when user taps the grid; triggers virtual keyboard on iOS/Android. -->
      <input id="grid-capture" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="characters"
        spellcheck="false" inputmode="text"
        style="position:fixed;left:-999px;top:-999px;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0">

      <div id="loop-timer-row">
        <label>LOOP EVERY <span id="timer-value">7</span>S</label>
        <input type="range" id="timer-slider" min="5" max="60" value="7">
      </div>

    </div>
  </div>

  <!-- Persistent footer -->
  <footer id="global-controls">
    <button id="btn-play">PLAY</button>
    <button id="btn-next">NEXT</button>
    <button id="btn-reset">RESET</button>
  </footer>

  <script type="module" src="/controller/controller.js"></script>

  <!-- Sentry error monitoring (optional — injected by server) -->
  <script>
    var sentryDsn = 'YOUR_SENTRY_DSN_HERE';
  </script>
  <script
    src="https://browser.sentry-cdn.com/7.119.0/bundle.min.js"
    crossorigin="anonymous"
    async></script>
  <script>
    window.addEventListener('load', function () {
      if (window.Sentry && sentryDsn && !sentryDsn.includes('YOUR_') && window.location.hostname !== 'localhost') {
        Sentry.init({ dsn: sentryDsn, environment: 'production' });
      }
    });
  </script>

  <!-- PostHog analytics (optional) -->
  <script>

      !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");for(var n=0;n<o.length;n++)t=t[o[n]];return t}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src="https://cdn.posthog.com/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(var c in s)u["__SV_"+c]=s[c];u.__SV_loaded=!0,e.config=s,e.opt_in_capturing=function(t){e.__opt_in_capturing=t},e.opt_out_capturing=function(t){e.__opt_out_capturing=t},e.opt_out_capturing(e.__opt_out_capturing===!0),e.identify=function(t){e.people&&e.people.set&&e.people.set(e.people.identify_flag||"distinct_id",t)},e.reset=function(){delete window.posthog.distinctID},e.register=function(t){e.config=Object.assign({},e.config,t)},e.register({config_name:e.config.name,loaded:new Date().toISOString(),version:e.config.version})},e.capture=function(t,o,n){e._i.push([t,o,n])},e.pageview=function(t,o){e._i.push(["$pageview",{$current_url:t}])},e.page_view=function(t,o){e._i.push(["$pageview",{$current_url:t},o])},e.people=e.people||{},e.people.set=function(t){e._i.push(["people.set",t])},e.people.set_once=function(t){e._i.push(["people.set_once",t])},e.people.unset=function(t){e._i.push(["people.unset",t])},e.people.increment=function(t){e._i.push(["people.increment",t])},e.people.append=function(t){e._i.push(["people.append",t])},e.people.union=function(t){e._i.push(["people.union",t])},e.group=e.group||{},e.group.identify=function(t){e._i.push(["group.identify",t])},e.group.set=function(t){e._i.push(["group.set",t])},e.group.set_once=function(t){e._i.push(["group.set_once",t])},e.group.unset=function(t){e._i.push(["group.unset",t])},e.group.increment=function(t){e._i.push(["group.increment",t])},e.group.append=function(t){e._i.push(["group.append",t])},e.group.union=function(t){e._i.push(["group.union",t])},e.getFeatureFlags=function(t,o){e._i.push(["getFeatureFlags",t])},e.getVariant=function(t,o){e._i.push(["getVarian       // Initialize PostHog if key is available
      var phKey = 'YOUR_POSTHOG_KEY_HERE'; // Replace with your PostHog key
      if (phKey && !phKey.includes('YOUR_')) {
        posthog.init(phKey, {
          api_host: 'https://app.posthog.com',
          person_profiles: 'identified_only',
          capture_pageleave: true
        });
      }
    } catch (e) {
      console.warn('[PostHog] Failed to initialize (this is optional):', e.message);
    }
  </script>
</body>
</html>
