<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Solari Controller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/splitflap.css">
  <link rel="stylesheet" href="controller.css">
</head>
<body>

  <!-- Persistent header — always visible, shows connection state -->
  <header id="ctrl-header">
    <div id="header-code">------</div>
    <div id="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-box" id="status-box">DISCONNECTED</span>
    </div>
  </header>

  <!-- Connection screen (covers body until approved) -->
  <div id="connect-screen">
    <div id="connect-status">CONNECTING...</div>
  </div>

  <!-- Main UI (hidden until phone_approved) -->
  <div id="controller-ui" hidden>

    <!-- Mode selector -->
    <section id="mode-section">
      <label class="mode-label">
        <input type="radio" name="mode" value="message" checked>
        <span>MESSAGE</span>
      </label>
      <label class="mode-label">
        <input type="radio" name="mode" value="clock">
        <span>CLOCK</span>
      </label>
    </section>

    <!-- Messages section: preview + instructions + list -->
    <section id="messages-section">

      <!-- Board preview (scrolls with page) -->
      <div id="preview-wrapper">
        <div id="board-preview"></div>
      </div>

      <!-- Color picker + instructions -->
      <div id="type-row">
        <span id="type-label">Type below.</span>
        <div id="emoji-picker">
          <button class="emoji-btn" data-color="r" title="Red">🔴</button>
          <button class="emoji-btn" data-color="o" title="Orange">🟠</button>
          <button class="emoji-btn" data-color="y" title="Yellow">🟡</button>
          <button class="emoji-btn" data-color="g" title="Green">🟢</button>
          <button class="emoji-btn" data-color="b" title="Blue">🔵</button>
          <button class="emoji-btn" data-color="p" title="Purple">🟣</button>
          <button class="emoji-btn" data-color="w" title="White">⚪</button>
        </div>
      </div>

      <!-- Message list injected by JS -->
      <div id="message-list"></div>

      <button id="btn-add-message">+ ADD MESSAGE</button>

      <div id="loop-timer-row">
        <label>LOOP EVERY <span id="timer-value">7</span>S</label>
        <input type="range" id="timer-slider" min="5" max="60" value="7">
      </div>

    </section>

  </div>

  <!-- Persistent footer -->
  <footer id="global-controls">
    <button id="btn-play">PLAY</button>
    <button id="btn-next">NEXT</button>
    <button id="btn-reset">RESET</button>
  </footer>

  <script type="module" src="controller.js"></script>
</body>
</html>
