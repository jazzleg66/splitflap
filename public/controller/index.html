<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Solari Controller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/splitflap.css">
  <link rel="stylesheet" href="controller.css">

  <!-- Sentry error monitoring (optional) -->
  <script>
    if (window.location.hostname !== 'localhost') {
      var sentryDsn = 'YOUR_SENTRY_DSN_HERE'; // Replace with your Sentry DSN
      if (sentryDsn && !sentryDsn.includes('YOUR_')) {
        fetch('https://browser.sentry-cdn.com/7.80.0/bundle.min.js', { mode: 'no-cors' })
          .then(() => {
            Sentry?.init({ dsn: sentryDsn, environment: 'production' });
          });
      }
    }
  </script>

  <!-- PostHog analytics (optional) -->
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");for(var n=0;n<o.length;n++)t=t[o[n]];return t}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src="https://cdn.posthog.com/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(var c in s)u["__SV_"+c]=s[c];u.__SV_loaded=!0,e.config=s,e.opt_in_capturing=function(t){e.__opt_in_capturing=t},e.opt_out_capturing=function(t){e.__opt_out_capturing=t},e.opt_out_capturing(e.__opt_out_capturing===!0),e.identify=function(t){e.people.set(e.people.identify_flag||"distinct_id",t)},e.reset=function(){delete window.posthog.distinctID},e.register=function(t){e.config=Object.assign({},e.config,t)},e.register({config_name:e.config.name,loaded:new Date().toISOString(),version:e.config.version})},e.capture=function(t,o,n){e._i.push([t,o,n])},e.pageview=function(t,o){e._i.push(["$pageview",{$current_url:t}])},e.page_view=function(t,o){e._i.push(["$pageview",{$current_url:t},o])},e.people.set=function(t){e._i.push(["people.set",t])},e.people.set_once=function(t){e._i.push(["people.set_once",t])},e.people.unset=function(t){e._i.push(["people.unset",t])},e.people.increment=function(t){e._i.push(["people.increment",t])},e.people.append=function(t){e._i.push(["people.append",t])},e.people.union=function(t){e._i.push(["people.union",t])},e.group.identify=function(t){e._i.push(["group.identify",t])},e.group.set=function(t){e._i.push(["group.set",t])},e.group.set_once=function(t){e._i.push(["group.set_once",t])},e.group.unset=function(t){e._i.push(["group.unset",t])},e.group.increment=function(t){e._i.push(["group.increment",t])},e.group.append=function(t){e._i.push(["group.append",t])},e.group.union=function(t){e._i.push(["group.union",t])},e.getFeatureFlags=function(t,o){e._i.push(["getFeatureFlags",t])},e.getVariant=function(t,o){e._i.push(["getVariant",t,o])},e.isFeatureEnabled=function(t){e._i.push(["isFeatureEnable     // Initialize PostHog if key is available
    var phKey = 'YOUR_POSTHOG_KEY_HERE'; // Replace with your PostHog key
    if (phKey && !phKey.includes('YOUR_')) {
      posthog.init(phKey, {
        api_host: 'https://app.posthog.com',
        person_profiles: 'identified_only',
        capture_pageleave: true
      });
    }
  </script>
</head>
<body>

  <!-- Persistent header — always visible, shows connection state -->
  <header id="ctrl-header">
    <div id="header-code">------</div>
    <div id="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-box" id="status-box">DISCONNECTED</span>
    </div>
  </header>

  <!-- Connection screen (covers body until approved) -->
  <div id="connect-screen">
    <div id="connect-status">CONNECTING...</div>
  </div>

  <!-- Main UI (hidden until phone_approved) -->
  <div id="controller-ui" hidden>

    <!-- PART A: Live mirror — sticky, full-width board preview -->
    <div id="mirror-section">
      <div id="preview-label">
        <span id="preview-live-text">LIVE ON BOARD</span>
        <span id="preview-code-badge">------</span>
        <span class="preview-dot"></span>
      </div>
      <div id="preview-wrapper">
        <div id="board-preview"></div>
      </div>
    </div>

    <!-- PART B: Controls — scrollable -->
    <div id="scroll-body">

      <!-- Mode selector -->
      <section id="mode-section">
        <label class="mode-label">
          <input type="radio" name="mode" value="message" checked>
          <span>MESSAGE</span>
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="clock">
          <span>CLOCK</span>
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="artwork">
          <span>ARTWORK</span>
        </label>
      </section>

      <!-- Message tabs + add button -->
      <div id="msg-nav">
        <div id="msg-tabs"></div>
        <button id="btn-add-message" title="Add message">+</button>
      </div>

      <!-- Color picker -->
      <div id="type-row">
        <span id="type-label">Color tile</span>
        <div id="emoji-picker">
          <button class="color-swatch" data-color="w" style="background:#FAFAFA" title="White"></button>
          <button class="color-swatch" data-color="r" style="background:#B34444" title="Red"></button>
          <button class="color-swatch" data-color="o" style="background:#CC8F52" title="Orange"></button>
          <button class="color-swatch" data-color="y" style="background:#F2D046" title="Yellow"></button>
          <button class="color-swatch" data-color="g" style="background:#3A5944" title="Green"></button>
          <button class="color-swatch" data-color="b" style="background:#4365A8" title="Blue"></button>
          <button class="color-swatch" data-color="p" style="background:#744471" title="Purple"></button>
        </div>
      </div>

      <!-- Active message row inputs — injected by JS -->
      <div id="message-list"></div>

      <!-- Artwork picker — shown in ARTWORK mode, injected by JS -->
      <div id="artwork-section" hidden></div>

      <!-- Hidden off-screen input — keyboard capture shim for the cell grid.
           Focused when user taps the grid; triggers virtual keyboard on iOS/Android. -->
      <input id="grid-capture" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="characters"
        spellcheck="false" inputmode="text"
        style="position:fixed;left:-999px;top:-999px;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0">

      <div id="loop-timer-row">
        <label>LOOP EVERY <span id="timer-value">7</span>S</label>
        <input type="range" id="timer-slider" min="5" max="60" value="7">
      </div>

    </div>
  </div>

  <!-- Persistent footer -->
  <footer id="global-controls">
    <button id="btn-play">PLAY</button>
    <button id="btn-next">NEXT</button>
    <button id="btn-reset">RESET</button>
  </footer>

  <script type="module" src="controller.js"></script>
</body>
</html>
