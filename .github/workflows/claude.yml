name: Claude

# Responds when you mention @claude in an issue or pull request comment/review.
# Requires the Claude GitHub App installed on the repo and a
# CLAUDE_CODE_OAUTH_TOKEN repository secret (Settings → Secrets and variables →
# Actions). Generate the token with `claude setup-token` (Claude Pro/Max).
# To bill against the Anthropic API instead, swap the auth input below for:
#   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only trusted repository collaborators can trigger this write-capable job.
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    env:
      # The project's npm install pulls Puppeteer (dev dep); don't fetch Chromium.
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Claude Pro/Max subscription auth (no API billing). Generate with
          # `claude setup-token`. For API-key billing, use anthropic_api_key instead.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
